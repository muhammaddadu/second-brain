$schema: https://raw.githubusercontent.com/electron-userland/electron-builder/master/packages/app-builder-lib/scheme.json
# Packaging config (ADR 0011). Produces installers per platform from electron-vite's `out/`.
# Signing/notarization are credential-gated (see docs/guides/building-and-releasing.md): unset
# credentials → an unsigned build that still installs (with an OS warning), so anyone can build.
appId: com.secondbrain.app
productName: Second Brain
# Bundle the built main/preload/renderer plus package.json; production deps are added automatically
# from the dependency graph. Source maps and TS are excluded to keep the app small.
files:
  - out/**
  - package.json
  - "!**/*.{map,ts,tsx}"
  - "!**/{tsconfig.json,tsconfig.*.json,vite.config.*,electron.vite.config.*}"
directories:
  output: dist
  buildResources: build
# Native/WASM assets must live outside the asar so Node/Electron can load them at runtime.
asarUnpack:
  - "**/node_modules/node-sqlite3-wasm/**"
  - "**/node_modules/onnxruntime-node/**"
  - "**/node_modules/@huggingface/**"
  - "**/node_modules/sharp/**"

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  # Hardened runtime + entitlements are required for notarization; harmless when unsigned.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

win:
  target:
    - target: nsis
      arch: [x64, arm64]

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true

linux:
  category: Utility
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]

# Where auto-update / release artifacts publish. GitHub Releases by default (electron-updater ready);
# no token needed just to build locally.
publish:
  provider: github
  owner: REPLACE_ME
  repo: note-agent-second-brain
