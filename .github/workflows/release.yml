name: Release

# Build installers for all three desktop OSes on a version tag and attach them to a draft release.
on:
  push:
    tags:
      - 'v*' # vX.Y.Z → production; vX.Y.Z-beta.N → beta (see env resolution below)
  workflow_dispatch:
    inputs:
      environment:
        description: Build environment
        type: choice
        default: production
        options: [production, beta, development]

permissions:
  contents: write

jobs:
  # Create the draft release ONCE before the matrix fans out. electron-builder's GitHub publisher
  # matches an existing draft by tag and reuses it; without this, all three OS jobs race to create
  # the draft, each finds none, and each makes its own — leaving assets split across duplicate
  # drafts (and breaking auto-update, which needs every latest*.yml on one release).
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure exactly one draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version=$(node -p "require('./apps/desktop/package.json').version")
          tag="v$version"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" \
              --draft --title "$version" --notes "Draft release for $tag."
          fi

  build:
    needs: prepare
    # True only when macOS signing is configured. Gates the signing steps so credential-less
    # releases and the Windows/Linux builds skip them and produce unsigned artifacts (ADR 0012).
    env:
      MAC_SIGNING: ${{ secrets.APPLE_API_KEY_BASE64 != '' }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Pick the environment: a `-beta.` tag → beta, else the dispatch input, else production.
      - name: Resolve build environment
        id: env
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" == *-beta.* ]]; then echo "value=beta" >> "$GITHUB_OUTPUT";
          else echo "value=${{ github.event.inputs.environment || 'production' }}" >> "$GITHUB_OUTPUT"; fi
      # macOS signing (ADR 0012): fetch the Developer ID cert read-only into an ephemeral keychain
      # via fastlane match, then hand the App Store Connect API key to the build step (for
      # notarization) through $GITHUB_ENV. Runs only on macOS when signing secrets are present;
      # every other build produces unsigned artifacts.
      - name: Set up Ruby (macOS signing)
        if: runner.os == 'macOS' && env.MAC_SIGNING == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - name: Provision signing certificate (fastlane match)
        if: runner.os == 'macOS' && env.MAC_SIGNING == 'true'
        env:
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_DEPLOY_KEY: ${{ secrets.MATCH_DEPLOY_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          # Read-only SSH deploy key scoped to the certs repo (git honors GIT_SSH_COMMAND).
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$MATCH_DEPLOY_KEY" > ~/.ssh/mobile_certs_key
          chmod 600 ~/.ssh/mobile_certs_key
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/mobile_certs_key -o IdentitiesOnly=yes"
          key_path="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$key_path"
          export APPLE_API_KEY="$key_path"
          bundle exec fastlane certs
          # Expose to the build step: electron-builder signs (keychain auto-discovery) + notarizes.
          {
            echo "APPLE_API_KEY=$key_path"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            echo "CSC_IDENTITY_AUTO_DISCOVERY=true"
          } >> "$GITHUB_ENV"
      # Build + publish (draft) installers to GitHub Releases — this also uploads the update
      # manifests (latest-mac.yml, …) that electron-updater reads. The macOS signing/notarization
      # env vars are injected by the step above when signing secrets are present; otherwise this is
      # an unsigned build.
      - name: Build & publish desktop installers
        run: pnpm --filter @brain/desktop release
        env:
          BUILD_ENV: ${{ steps.env.outputs.value }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ steps.env.outputs.value }}-${{ matrix.os }}
          path: |
            apps/desktop/dist/*/*.dmg
            apps/desktop/dist/*/*.zip
            apps/desktop/dist/*/*.exe
            apps/desktop/dist/*/*.AppImage
            apps/desktop/dist/*/*.deb
          if-no-files-found: ignore
