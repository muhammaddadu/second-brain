name: Release

# Build installers for all three desktop OSes on a version tag and attach them to a draft release.
on:
  push:
    tags:
      - 'v*' # vX.Y.Z → production; vX.Y.Z-beta.N → beta (see env resolution below)
  workflow_dispatch:
    inputs:
      environment:
        description: Build environment
        type: choice
        default: production
        options: [production, beta, development]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Pick the environment: a `-beta.` tag → beta, else the dispatch input, else production.
      - name: Resolve build environment
        id: env
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" == *-beta.* ]]; then echo "value=beta" >> "$GITHUB_OUTPUT";
          else echo "value=${{ github.event.inputs.environment || 'production' }}" >> "$GITHUB_OUTPUT"; fi
      # Build + publish (draft) installers to GitHub Releases — this also uploads the update
      # manifests (latest-mac.yml, …) that electron-updater reads. Signing secrets used when present.
      - name: Build & publish desktop installers
        run: pnpm --filter @brain/desktop release
        env:
          BUILD_ENV: ${{ steps.env.outputs.value }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization (optional — set as repo secrets to enable)
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ steps.env.outputs.value }}-${{ matrix.os }}
          path: |
            apps/desktop/dist/*/*.dmg
            apps/desktop/dist/*/*.zip
            apps/desktop/dist/*/*.exe
            apps/desktop/dist/*/*.AppImage
            apps/desktop/dist/*/*.deb
          if-no-files-found: ignore
